body:
  text: 之一碑陽禪靜寺剎前銘敬史君之碑公名字顯俊平陽泰平人蓋虞舜之苗裔田敬仲之後也舜有康哉之唱敬有和鳴之應德徽書史道合無名自茲以降世阜哲人龜組繼襲英聲不朽公資黃中之雅氣稟川嶽之粹靈苞一德於懷抱淵万頃於胸襟操節端華風神雅峻博學多通無所成名振徽音於綺歲備九德於冠年豈伊一日千里實曰王佐之才解褐奉朝請於時女后稱制權移外戚黨樹私門謀危王室公乘義發憤肆忠奉國結周公河西之略咨義真折角之恥掛冠辭闕杖劍歸鄉虎步方州翹心日角孝莊統曆攝履還朝帝嘉乃功用優勳賞封泰平縣開國子除晉州別駕永安云季元凶伏罪殘醜遺燼更相鳩率始資賈詡之計終成李郭之舉責罪宣平交兵象闕長戟百万胡騎千群大丞相勃海王德隆齊晉作牧唐都志存匡合克剪封鯨以公器宇淵亮民望所歸特申情抱委以經謀公深識時雄罔計強弱豹變從時應機而起毗文贊武專按劍之功帷籌野戰參斷鰲之力長蛇既剿龜鼎惟新策勳有典式酬功效進封永安侯食邑千戶拜車騎將軍度支尚書俄遷都官尚書公位居省闥職在樞機竭忠奉上庶情求瘼獎進英賢糾廢奸匿宿滯必申頽綱由整今上德配玄黃融齊日月鑒殷徙御未遑外略秦隴放命乘此憑陵驅率戎虜擾我生民汾晉邊遐偏被其毒惟捍所寄事符賢桀乃以公為汾州刺史尋轉晉州刺史車騎侯如故公秉麾出閫佩錦歸鄉明賞罰以勸元戎敷仁澤以字黎庶乘機迭出智勇兼奮聿未周奸渠遁跡百城旆檡四民歸堵敢飯之嗂不息安居之詠更新雖李牧禦邊細侯治雍不能尚也又燕司失馭編荒作逆連黑山之衆峙黃巾之勢縱橫海表陸梁幽冀震感皇衷命公是討公運六奇於帷幄忘七尺於戎行探淮陰平趙之略協段穎破羌之謀廣張旗幟厲怒三軍紛紜馳突遂夷凶醜凱旋而歸增隆寵秩拜儀同三司韓地邊嶮繡連蠻楚夏風攸改彯僞成俗密人不恭鵄張溪壑黠虜因資玩威疆場歷政為鯁莫能芟遏百姓雕傷流離略盡天子悼兆民之荼炭惟邊祏之須才終朝忘食夜分不寢以公略不世德效纍彰除殘拯溺非莫可加拜驃騎大將軍潁州刺史大都督潁州諸軍事儀同三司開國如故公深惟臣辱職不求易憘遇槃根薄言來踐輕賦斂以阜民財勞吐握以招賢俊嚴治烽候宿裝輕肥權火或舉豹騎爭先鬼出電入梟囚万計賞不踰功罰必當罪人物輻輳繈負雲歸玉燭登年絃歌不息亦既芟夷世難功濟生民復惟舟梁苦海運茲迷溺敬崇三寶翹翥九劫望維衛以虛心念毗耶而延佇此地實為高敝眺實遐隆遠乘山嶽邇帶池閣惟金剛之妙宅諒神基之淨土故平陽太守潁川太守使持節秦州刺史梁洪雅攝情物外宅志道場爰建精廬鬱茲形勝水火亟交年歲攸積龍宮梵室雕落朽故公乃勉率僚佐肅心營造遠訪名工窮盡巧麗建七層之寶剎寫雙樹之光儀金瓊疊照朱紫聯華長廊四密廣夏清疏名僧遠萃大法津流憑此至誠仰願皇帝陛下祚隆天地齊光九劫化漸三塗率偕四果自誓勗順終如始有滅有生無虧八万之因無生無滅濟此娑婆之苦湛露易晞貞剛惟久式裁金石永昭不朽作頌曰惟聖之後達者克昌代綰圭組世有蘭芳挺茲明德隆贊霸王齊鑣管范間步蕭張弱齡聰璿岐年秀發藉蔭聖童殉齊初月疾惡如風趣善如蹶百行斯兼三省無闕作牧西蕃君臨南甸荒股來庭鯨鯢由剪政行保鄣化狷絲繭大啓千乘職聯三鉉發揚拯壓開職道矇飛甍架雨寶剎分虹月光照曜日映玲瓏業茲世福永樹來功檀越元囿鸞施地仵拾畝新除使持節都督潁州諸軍事驃騎將軍潁州刺史當州都督崔叔仁施地檀越故潁川太守王儒檀越馮景和儀和施地卅畝維大魏興和二年龍集庚申檀越朱景略息思和施地草畝之二碑陰邑子中軍將軍潁州長史宋果司馬彭預中堅將軍潁州驃大府倉曹參軍向雍參軍賈充持節假征西將軍平西將軍陽翟鎮將帶陽翟太守晉州平陽郡晉秋鄉吉遷里人敬鴻顯安東將軍銀青光祿大夫潁州督府長史趙勤之都督王遷許昌太守趙文光謝遠民望沈清民望宋方潁州沙門統慧元當營構寺主道智持節鎮南將軍潁川太守高沖都督張賓州主簿別駕陳遵趙亮民望孫獻隊主石猛潁州沙門統曇永營福都維那慧蓋持節假征西將軍太中大夫陽翟太守敬鴻顯都督李柱郡功曹陳敬都民望陳樹民望許雲邑吳六奇司州沙門統道鐔長兼都維那慧生持節假安東將軍許昌太守呂道興都督瘐玩邑子陳始明民望陳世用民望藥璨黨許洪朗陽州沙門統道慈長兼都維那靜意陳留太守敬欣小郎君敬清奴都督王榮都督陳胡民望孫世通長史荀樂潁州沙門都道業長兼都維那道果州録事參軍敬遵顯騎兵敬穆都督趙珍都督王族民望宋大業民望趙珍潁州沙門都慧範長兼都維那道海州別駕薛宗邑子長流袁孝則督韓略都督靳輝民望孫騰達民望李愛潁州沙門都智定州治中崔叔亮邑外兵柴軌督韓章都督爾歡民望姜江珍騎兵朱海潁州沙門都曇佳州司馬崔子琰邑子外兵王貴都督薛璨都督張豔民望趙龍光月令戴翔潁州大律師靜遵州治中毛集邑子州散騎楊業都督元志都督許祖民望劉元才西曹馬超潁州沙門都僧雅州治中敬伏護邑子散騎匡乾城局魏孫都督趙遵民望許天扶録事董景法師晉州都靈洪中軍將軍敬景俊郎中郭延買士曹李遠都督徐延民望韓次賓民望許寶法師司徒寺慧辨中兵敬乾歡潁川郡丞孟延和默曹姚泰都督賓民望孫陽爾省事趙謙萇社縣維那法嵩主簿敬頻中兵參軍薛虯士曹宋孫融孫長和道人惠哲張顯公寺主法敬主簿敬子瑜功曹參軍薛略功曹鄒卓都祖民望孫法凝西曹張徽法師寧國寺曇整鎮城樊後興集曹參軍李辨門下程遠博士化民望張承洛李臺尉姨法師寧國寺法豫萇社令魏族都督井盆祭酒唐纂都督敬難阤民望韓係叔司馬王買暉法師丈八寺僧慶許昌令楊悅都督敬世祭酒玄源都督毛季業民望韓海華外兵司馬景法師司徒寺僧景臨潁令郭叔都督郝沖祭酒孫欣都督萬孟津民望趙方達外兵王景嵩元領軍寺主法興潁陰令柴興都督劉朏西曹石纂都督孫承明民望仇猛虎帳內王鸞海臨潁縣維那道顯許昌令柴俊都督敬珍西曹楊珍都督王遵賢民望聶保壽民望劉彥始潁川郡維那僧度隱陵令孫祖都督裴祥主簿張秀都督王買助教聶柒虎黨司徒始隆許昌郡維那法炬扶溝令張靜都督索闍主簿趙安五官成勇沈貴遠蔡萇洛邑子韓長茂陽翟郡維那道希州都陳始和都督薛賓邑子姜思賓民望伏生穎當世毛仲賢都督敬文賢法師祖寺僧遠州都郭惡蚝都督伏愛邑子姜始宗民望景嵩趙永隆屈伯奴丘哲王乾敬公門師慧哲州主簿陳延都督陳族邑子龍伯達長流張尚尹洛祖告苟子趙常鍾遵齊主白塔寺道場中兵梁蘭景都督王和邑子龍讚民望力和韓道顯馬伏貴張穆閻翔前禪靜寺主智遵長流胡長俊都督思和邑子李遵民望鄭明陳榮國王叔爾龍顯閻乾前禪靜寺主法榮鎧曹賈思慶都督王顯邑子和祖邑子王仕元邑子成淵胡女休韓亮焦辨
